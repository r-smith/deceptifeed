{{ template "head" . }}
<body class="full-width">
  <header>
    {{- template "nav" .NavData }}
  </header>

  <main class="full-width">
    {{- if .Data }}
    <table class="logs logs-http">
      <thead>
        <tr><th>Time<th>Source IP<th>Method<th>Path
      </thead>
      <tbody>
        {{- range .Data }}
        <tr><td>{{ .Time.Format "2006-01-02 15:04:05" }}<td>{{ .SourceIP }}<td>{{ .Details.Method }}<td>{{ .Details.Path }}
        {{- end }}
      </tbody>
    </table>
    {{- else }}
    <p class="no-results">No log data found</p>
    {{- end }}
  </main>
</body>
</html>
